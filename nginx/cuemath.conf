# CueMath Nginx 配置示例
# 部署在 maxuebing.cn/cue/ 子路径，支持 HTTPS（certbot --nginx 自动续期）
#
# 使用方式：
#   sudo cp nginx/cuemath.conf /etc/nginx/conf.d/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d maxuebing.cn

server {
    listen 80;
    server_name maxuebing.cn;

    # /cue 子路径重定向到 /cue/（相对路径资源需要尾斜杠）
    location = /cue {
        return 301 /cue/;
    }

    location /cue/ {
        alias /var/www/cuemath/dist/;
        index index.html;

        # SPA fallback（前端路由虽暂未使用，预留）
        try_files $uri $uri/ /cue/index.html;

        # Vite 构建的静态资源（文件名含 hash，长期缓存）
        location /cue/assets/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # index.html 不缓存，确保更新即时生效
        location = /cue/index.html {
            expires -1;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }

        # 压缩
        gzip on;
        gzip_types text/css application/javascript application/json image/svg+xml;
        gzip_min_length 1000;
    }

    # 安全头（HTTPS 开启后更完整）
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
